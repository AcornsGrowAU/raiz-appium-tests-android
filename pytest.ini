[pytest]
testpaths = tests
addopts = -v --html=reports/report.html --self-contained-html --alluredir=reports/allure-results
markers =
    smoke: core flows that must pass on every build
    regression: full regression suite
    auth: login / logout / PIN flows
    navigation: drawer, deep links, tab navigation
    portfolio: main portfolio screen and sub-screens
    investments: lump sum, withdraw, recurring
    rewards: rewards earn and track
    settings: settings screen items
    e2e: full end-to-end user journeys that assert state/value, not just presence
    destructive: mutates account state (submits a real DEV transaction); opt-in via RUN_DESTRUCTIVE=1
    edge: negative / boundary cases (below minimum, over balance, invalid input)
    unit: pure-function unit tests — no device/Appium required
